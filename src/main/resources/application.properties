server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:mem:biddb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

app.uploads-dir=${UPLOADS_DIR:/home/site/uploads}
app.base-url=${APP_BASE_URL:}
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,https://bitdding-frontend.vercel.app,*
